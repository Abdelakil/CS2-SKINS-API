name: Update Data

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch:      # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scripts
        run: |
          python Gloves.py
          python Agents.py
          python Skins.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Stage all generated files
          git add gloves_en.json agents.json skins_en.json
          # Only commit and push if there are actual differences
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Skins, Gloves, and Agents" && git push)